<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>三浦コンピュータクラブ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Fira Code", Monaco, Consolas, "Ubuntu Mono", monospace;
      background: #1f222a;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 24px 16px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(120, 226, 160, 0.2);
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #78e2a0;
    }

    main {
      width: 100%;
      max-width: 480px;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ---- photo picker ---- */
    .photo-area {
      width: 100%;
      aspect-ratio: 1;
      border: 2px dashed rgba(120, 226, 160, 0.3);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      background: rgba(120, 226, 160, 0.04);
      transition: border-color 0.2s;
      position: relative;
    }

    .photo-area:hover { border-color: #78e2a0; }

    .photo-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: rgba(120, 226, 160, 0.4);
      pointer-events: none;
    }

    .photo-placeholder svg { width: 52px; height: 52px; }

    .photo-placeholder span {
      font-size: 0.85rem;
    }

    input[type="file"] { display: none; }

    /* ---- style toggle ---- */
    .style-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .style-label {
      color: #78e2a0;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .style-toggle {
      display: flex;
      flex: 1;
      border: 1px solid rgba(120, 226, 160, 0.4);
      border-radius: 4px;
      overflow: hidden;
    }

    .style-toggle button {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .style-toggle button.active {
      background: #78e2a0;
      color: #1f222a;
      font-weight: 700;
    }

    /* ---- send button ---- */
    .btn {
      width: 100%;
      padding: 16px;
      border: 1px solid #78e2a0;
      border-radius: 4px;
      background: transparent;
      color: #78e2a0;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn:hover:not(:disabled) {
      background: #78e2a0;
      color: #1f222a;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ---- result ---- */
    .result-section {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .result-img-wrap {
      width: 100%;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    canvas {
      width: 100%;
      display: block;
    }

    .btn-save {
      border-color: rgba(120, 226, 160, 0.4);
      color: rgba(120, 226, 160, 0.7);
    }

    /* ---- loading ---- */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(120, 226, 160, 0.2);
      border-top-color: #78e2a0;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p {
      color: rgba(120, 226, 160, 0.6);
      font-size: 0.85rem;
    }

    /* ---- error ---- */
    .error-msg {
      display: none;
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.4);
      border-radius: 4px;
      color: #ff9999;
      font-size: 0.85rem;
      text-align: center;
    }

    footer {
      margin-top: auto;
      padding: 20px;
      text-align: center;
    }

    footer a {
      color: rgba(120, 226, 160, 0.6);
      text-decoration: none;
      font-size: 0.8rem;
    }

    footer a:hover { color: #78e2a0; }
  </style>
</head>
<body>
  <header>
    <h1>三浦コンピュータクラブ　画像処理</h1>
  </header>

  <main>
    <div class="photo-area" id="photoArea" onclick="document.getElementById('fileInput').click()">
      <div class="photo-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.776 48.776 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" />
        </svg>
        <span>写真を選択する</span>
      </div>
      <img id="preview" alt="選択した写真" />
    </div>

    <input type="file" id="fileInput" accept="image/*" />

    <div class="style-row">
      <span class="style-label">スタイル：</span>
      <div class="style-toggle">
        <button id="btnWatercolor" class="active" onclick="setStyle('watercolor')">水彩</button>
        <button id="btnAnime" onclick="setStyle('anime')">アニメ</button>
      </div>
    </div>

    <button class="btn" id="sendBtn" disabled onclick="send()">SEND</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p id="loadingText">画像を処理中...</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-section" id="resultSection">
      <div class="result-img-wrap">
        <canvas id="resultCanvas"></canvas>
      </div>
      <button class="btn btn-save" onclick="saveImage()">保存する</button>
    </div>
  </main>

  <footer>
    <a href="https://miura.io/" target="_blank" rel="noopener">www.miura.io</a>
  </footer>

  <script>
    const fileInput    = document.getElementById('fileInput');
    const preview      = document.getElementById('preview');
    const placeholder  = document.getElementById('placeholder');
    const sendBtn      = document.getElementById('sendBtn');
    const loading      = document.getElementById('loading');
    const loadingText  = document.getElementById('loadingText');
    const resultSection = document.getElementById('resultSection');
    const resultCanvas = document.getElementById('resultCanvas');
    const errorMsg     = document.getElementById('errorMsg');

    let selectedFile = null;
    let selectedStyle = 'watercolor';

    function setStyle(style) {
      selectedStyle = style;
      document.getElementById('btnWatercolor').classList.toggle('active', style === 'watercolor');
      document.getElementById('btnAnime').classList.toggle('active', style === 'anime');
    }

    fileInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];
      if (!selectedFile) return;
      preview.src = URL.createObjectURL(selectedFile);
      preview.style.display = 'block';
      placeholder.style.display = 'none';
      sendBtn.disabled = false;
      resultSection.style.display = 'none';
      hideError();
    });

    async function send() {
      if (!selectedFile) return;

      setLoading(true);
      hideError();
      resultSection.style.display = 'none';

      const steps = ['画像を分析中...', 'シーンを描いています...', '仕上げ中...', 'もうすぐ完成...'];
      let step = 0;
      const stepTimer = setInterval(() => {
        step = (step + 1) % steps.length;
        loadingText.textContent = steps[step];
      }, 3500);

      try {
        const form = new FormData();
        form.append('file', selectedFile);
        form.append('style', selectedStyle);

        const resp = await fetch('/api/cartoonify', { method: 'POST', body: form });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `エラー ${resp.status}`);
        }

        const { image } = await resp.json();
        await renderResult(image);
        resultSection.style.display = 'flex';
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        showError(err.message || 'エラーが発生しました。もう一度お試しください。');
      } finally {
        clearInterval(stepTimer);
        setLoading(false);
      }
    }

    function renderResult(dataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          resultCanvas.width  = img.naturalWidth;
          resultCanvas.height = img.naturalHeight;
          const ctx = resultCanvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          resolve();
        };
        img.src = dataUrl;
      });
    }

    function saveImage() {
      const ts = new Date().toISOString().replace(/[-:T]/g, '').slice(0, 15);
      resultCanvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `art_${ts}.png`;
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }, 'image/png');
    }

    function setLoading(on) {
      loading.style.display = on ? 'flex' : 'none';
      sendBtn.disabled = on;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function hideError() {
      errorMsg.style.display = 'none';
    }
  </script>
</body>
</html>
